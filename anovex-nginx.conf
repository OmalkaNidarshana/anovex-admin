# /etc/nginx/sites-available/anovex-admin
# Anovex Technologies — Admin Dashboard
# Fully nginx-native. No .htaccess required.
#
# SETUP:
#   1. sudo cp anovex-nginx.conf /etc/nginx/sites-available/anovex-admin
#   2. sudo ln -sf /etc/nginx/sites-available/anovex-admin /etc/nginx/sites-enabled/anovex-admin
#   3. sudo rm -f /etc/nginx/sites-enabled/default
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name admin.anovextechnologies.com;

    # ── Change this to your actual project folder ──────────────
    root /home/admin/anxt;
    index index.html;

    # ── phpMyAdmin ──────────────────────────────────────────────
    location /phpmyadmin {
        root /usr/share/;
        index index.php index.html;

        location ~ ^/phpmyadmin/(.+\.php)$ {
            root /usr/share/;
            try_files $uri =404;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            include fastcgi_params;
        }

        location ~* ^/phpmyadmin/(.+\.(css|js|png|jpg|gif|ico|svg|woff2?))$ {
            root /usr/share/;
        }
    }

    # ── Block sensitive directories ─────────────────────────────
    location ~ ^/(config|middleware)(/?|/.*)$ {
        deny all;
        return 403;
    }

    # ── Block sensitive file types ──────────────────────────────
    location ~* \.(env|sql|md|log|sh|bak|ini)$ {
        deny all;
        return 403;
    }

    # ── API endpoints (/api/*.php) ──────────────────────────────
    location /api {
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            include fastcgi_params;

            # CORS
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        }

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Serve static assets with caching ───────────────────────
    location ~* \.(html|css|js|svg|png|jpg|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── SPA catch-all → index.html ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/anovex-admin.access.log;
    error_log  /var/log/nginx/anovex-admin.error.log;
}
